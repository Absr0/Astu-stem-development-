<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div>Student Dashboard</div>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

  <h3>Report Item</h3>
  <form id="item-form">
    <input type="text" id="item-title" placeholder="Item Name" required>
    <input type="text" id="item-category" placeholder="Category" required>
    <input type="text" id="item-location" placeholder="Location" required>
    <select id="item-type">
      <option value="lost">Lost</option>
      <option value="found">Found</option>
    </select>
    <textarea id="item-desc" placeholder="Description"></textarea>
    <button type="submit">Submit</button>
  </form>

  <h3>All Items</h3>
  <div id="items-container"></div>

</div>

<script src="script.js"></script>
</body>
</html>
